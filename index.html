/* ── safe clipboard copy (works on HTTP too) ── */
function safeCopy(text, cb) {
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text).then(cb).catch(() => fallback(text, cb));
  } else {
    fallback(text, cb);
  }
}
function fallback(text, cb) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0;';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  try { document.execCommand('copy'); cb(); } catch(e){}
  document.body.removeChild(ta);
}

/* helpers */
function parseMD(text){
  if(!text||!text.trim()) return null;

  // ── Phase 1: Normalise line endings ──
  const raw = text.replace(/\r\n/g,'\n').replace(/\r/g,'\n');

  // ── Phase 2: Reconstruct table lines ──
  // Strategy: a "table line" is any line that contains "|"
  // Lines without "|" that follow a table line are cell continuations
  const lines = raw.split('\n');
  const tableLines = [];
  for(const line of lines){
    const t2 = line.trim();
    if(!t2) continue;
    if(t2.includes('|')){
      tableLines.push(t2);
    } else if(tableLines.length > 0){
      // Append as continuation to previous line
      tableLines[tableLines.length-1] += ' ' + t2;
    }
  }

  if(tableLines.length < 2) return null;

  // ── Phase 3: Split each line into cells ──
  // Handle both "| a | b |" and "a | b | c" formats
  function splitRow(line){
    // Remove optional leading/trailing |
    const stripped = line.replace(/^\|/, '').replace(/\|$/, '');
    return stripped.split('|').map(c => c.trim());
  }

  // ── Phase 4: Detect & skip separator rows (|---|---|) ──
  function isSeparator(line){
    return /^[\|\-\s:=]+$/.test(line);
  }

  // ── Phase 5: Find header row index (first non-separator row) ──
  let headerIdx = -1;
  for(let i=0; i<tableLines.length; i++){
    if(!isSeparator(tableLines[i])){ headerIdx = i; break; }
  }
  if(headerIdx < 0) return null;

  // ── Phase 6: Parse data rows ──
  const data = [];
  for(let i = headerIdx+1; i < tableLines.length; i++){
    const row = tableLines[i];
    if(isSeparator(row)) continue;

    const cells = splitRow(row);
    if(cells.length < 2) continue;

    // Find the rightmost cell that is a valid score (number 1-100)
    // We scan from right to left
    let scoreIdx = -1;
    let scoreVal = 0;
    for(let k = cells.length-1; k >= 0; k--){
      const raw2 = cells[k].replace(/[^\d.]/g,'');
      if(!raw2) continue;
      const v = parseFloat(raw2);
      if(!isNaN(v) && v > 0 && v <= 100){
        scoreIdx = k;
        scoreVal = v;
        break;
      }
    }

    // If no numeric score found, skip this row
    // BUT — if we have at least 2 cells and the last cell is empty or a label,
    // try assigning score = 0 so the row still shows in preview
    if(scoreIdx < 0){
      // Last attempt: any number anywhere
      for(let k=0; k<cells.length; k++){
        const raw2 = cells[k].replace(/[^\d.]/g,'');
        if(raw2){ const v=parseFloat(raw2); if(!isNaN(v)&&v>=0&&v<=100){scoreIdx=k;scoreVal=v;break;} }
      }
      if(scoreIdx < 0) continue;
    }

    // Assign columns based on position relative to score
    // Columns before score: [section?, qNum?, bloom?, content?]
    const pre = cells.slice(0, scoreIdx);
    const section      = pre[0] || '';
    const qNum         = pre[1] || '';
    const bloomSkill   = pre[2] || '';
    const contentSkill = pre[3] || '';

    // Skip rows where all meaningful fields are empty (likely a stray line)
    if(!section && !qNum && !bloomSkill && !contentSkill && !scoreVal) continue;

    data.push({ section, qNum, bloomSkill, contentSkill, max: scoreVal });
  }

  return data.length > 0 ? data : null;
}

function parseScores(raw){
  const rows=raw.split('\n').map(r=>r.split('\t'));
  let sc=[];
  rows.forEach(r=>{const v=parseFloat(r[r.length-1]);if(!isNaN(v)&&v>=0&&v<=100)sc.push(v);});
  if(!sc.length) rows.forEach(r=>{const v=parseFloat(r[r.length-2]);if(!isNaN(v)&&v>=0&&v<=100)sc.push(v);});
  return sc;
}

function buildDist(scores){
  const d={"0-40":0,"40-60":0,"60-80":0,"80-100":0};
  scores.forEach(s=>{if(s<=40)d["0-40"]++;else if(s<=60)d["40-60"]++;else if(s<=80)d["60-80"]++;else d["80-100"]++;});
  return d;
}

function avg(sc){return sc.length?sc.reduce((a,b)=>a+b,0)/sc.length:0;}

function doExportDocx(data){
  const {Document,Packer,Paragraph,TextRun,Table,TableRow,TableCell,WidthType,AlignmentType,HeadingLevel}=docx;
  const t=data.t;
  const mp=(txt)=>new Paragraph({children:[new TextRun({text:String(txt),size:22})]});
  const mh=(txt,c)=>new Paragraph({heading:HeadingLevel.HEADING_2,children:[new TextRun({text:txt,bold:true,size:28,color:c||'1d4ed8'})]});
  const mc=(txt,bold,fill)=>new TableCell({
    shading:fill?{fill}:undefined,
    children:[new Paragraph({alignment:AlignmentType.CENTER,children:[new TextRun({text:String(txt),bold:!!bold,size:20})]})]
  });
  const doc2=new Document({sections:[{properties:{},children:[
    new Paragraph({alignment:AlignmentType.CENTER,children:[new TextRun({text:t.mainTitle,bold:true,size:44,color:'ea580c'})]}),
    new Paragraph({alignment:AlignmentType.CENTER,children:[new TextRun({text:t.mainSub,size:26,color:'92400e'})]}),
    new Paragraph({alignment:AlignmentType.CENTER,children:[new TextRun({text:t.planTitle,size:28,bold:true})]}),
    new Paragraph({}),
    mh('1. '+t.distSection),
    mp(t.totalStudents+': '+data.analytics.totalStudents),
    mp(t.intensive+': '+data.analytics.distribution["0-40"]),
    mp(t.strategic+': '+data.analytics.distribution["40-60"]),
    mp('60-80: '+data.analytics.distribution["60-80"]),
    mp('80-100: '+data.analytics.distribution["80-100"]),
    mp(t.avgLabel+': '+data.analytics.average.toFixed(1)),
    new Paragraph({}),
    mh('2. '+t.timeframe,'7c3aed'),
    mp(t.workPeriod+': '+(data.plan.period||t.notSet)),
    mp(t.weeklyHours+': '+(data.plan.hours||t.notSet)),
    mp(t.evalMethod+': '+(data.plan.assessment||t.notSet)),
    mp(t.reEvalDate+': '+(data.plan.reEvalDate||t.notSet)),
    mp(t.availableRes+': '+(data.plan.resources||t.notSet)),
    new Paragraph({}),
    mh('3. '+t.strategiesTitle,'ea580c'),
    new Table({width:{size:100,type:WidthType.PERCENTAGE},rows:[
      new TableRow({children:[mc(t.groupTarget,true,'dbeafe'),mc(t.strategy,true,'dbeafe')]}),
      new TableRow({children:[mc(t.intensiveGroup,true,'fee2e2'),mc(t.intensiveStr)]}),
      new TableRow({children:[mc(t.strategicGroup,true,'fef9c3'),mc(t.strategicStr)]}),
      new TableRow({children:[mc(t.enrichGroup,true,'dcfce7'),mc(t.enrichStr)]}),
    ]}),
    new Paragraph({}),
    mp(t.mainTitle+' — '+new Date().toLocaleDateString()),
  ]}]});
  Packer.toBlob(doc2).then(blob=>{
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download='plan_'+(data.teacher.grade||'class')+'.docx';
    a.click();
  });
}

          fontSize:'1rem',color:'#374151',lineHeight:'1.8',
          whiteSpace:'pre-wrap',direction:'auto',textAlign:'center'
        }}>{msg}</div>
        <button onClick={onClose} style={{
          marginTop:'24px',width:'100%',padding:'13px',
          borderRadius:'14px',border:'none',cursor:'pointer',
          background:'linear-gradient(135deg,#1e3a5f,#0f2749)',
          color:'white',fontWeight:700,fontSize:'1rem',
          fontFamily:"'Cairo',sans-serif"
        }}>OK</button>
      </div>
    </div>
  );
};


/* ── Draft Prompt Screen ── */
const DraftPrompt=({t,draft,onContinue,onFresh,dir})=>{
  const sub   = draft?.subject ? (SUBJECT_META[draft.subject]?.icon||'') : '';
  const grade = draft?.teacher?.grade || '';
  const date  = draft?.teacher?.date  || '';
  const name  = draft?.teacher?.name  || '';
  const info  = (t.draftInfo||'')
    .replace('%1', grade)
    .replace('%2', sub + ' ' + (draft?.subjects?.[draft?.subject]||''))
    .replace('%3', date);
  return(
    <div style={{position:'fixed',inset:0,zIndex:8888,background:'rgba(0,0,0,.55)',backdropFilter:'blur(6px)',display:'flex',alignItems:'center',justifyContent:'center',padding:'20px'}} dir={dir}>
      <div className="fade-in" style={{background:'white',borderRadius:'24px',padding:'36px 28px',maxWidth:'420px',width:'100%',boxShadow:'0 20px 60px rgba(0,0,0,.35)',textAlign:'center'}}>
        <div style={{fontSize:'3rem',marginBottom:'12px'}}>💾</div>
        <h2 style={{fontSize:'1.3rem',fontWeight:900,color:'#1e3a5f',marginBottom:'8px'}}>{t.draftFound}</h2>
        <p style={{color:'#6b7280',fontSize:'.9rem',marginBottom:'6px'}}>{t.draftSub}</p>
        {name && <div style={{background:'#f1f5f9',borderRadius:'12px',padding:'10px 16px',margin:'14px 0',fontSize:'.85rem',fontWeight:600,color:'#374151'}}>
          👤 {name}<br/>
          <span style={{color:'#6b7280',fontWeight:400}}>{grade} {date?'· '+date:''}</span>
        </div>}
        <div style={{display:'flex',flexDirection:'column',gap:'10px',marginTop:'18px'}}>
          <button onClick={onContinue} style={{padding:'14px',borderRadius:'14px',border:'none',cursor:'pointer',background:'linear-gradient(135deg,#1e3a5f,#0f2749)',color:'white',fontWeight:700,fontSize:'1rem',fontFamily:"'Cairo',sans-serif",boxShadow:'0 4px 16px rgba(15,39,73,.3)'}}>
            ▶ {t.draftContinue}
          </button>
          <button onClick={onFresh} style={{padding:'14px',borderRadius:'14px',border:'2px solid #e5e7eb',cursor:'pointer',background:'white',color:'#374151',fontWeight:700,fontSize:'1rem',fontFamily:"'Cairo',sans-serif"}}>
            ✨ {t.draftNew}
          </button>
        </div>
      </div>
    </div>
  );
};

/* ══ MAIN APP ══ */
const App=()=>{
  // Draft is NEVER loaded automatically — only when user explicitly chooses
  const [lang,setLang]=useState(null);
  const [modalMsg,setModalMsg]=useState(null);
  const [showDraftPrompt,setShowDraftPrompt]=useState(false);
  const [draftData,setDraftData]=useState(null);
  const [subject,setSubject]=useState(null);
  const [phase,setPhase]=useState(0);
  const [teacher,setTeacher]=useState({name:'',grade:'',date:''});
  const [tableRaw,setTableRaw]=useState('');
  const [parsedQ,setParsedQ]=useState([]);
  const [gradesRaw,setGradesRaw]=useState('');
  const [analytics,setAnalytics]=useState(null);
  const [plan,setPlan]=useState({resources:'',period:'',hours:'',assessment:'',reEvalDate:''});
  const [showPlan,setShowPlan]=useState(false);
  const [savedMsg,setSavedMsg]=useState(false);
  const [showCompare,setShowCompare]=useState(false);
  const [compareRaw,setCompareRaw]=useState('');
  const [compareAna,setCompareAna]=useState(null);

  const chartRef=useRef(null);
  const canvasRef=useRef(null);
  const cmpChartRef=useRef(null);
  const cmpCanvasRef=useRef(null);

  const t=UI[lang||'ar'];
  const dir=(lang==='ar'||lang==='he')?'rtl':'ltr';
  const sm=subject?SUBJECT_META[subject]:null;

  // ── Draft handlers ──
  const handleContinueDraft=()=>{
    if(!draftData) return;
    const d=draftData;
    if(d.lang)      setLang(d.lang);
    if(d.subject)   setSubject(d.subject);
    if(d.phase)     setPhase(d.phase);
    if(d.teacher)   setTeacher(d.teacher);
    if(d.tableRaw)  setTableRaw(d.tableRaw);
    if(d.parsedQ)   setParsedQ(d.parsedQ);
    if(d.gradesRaw) setGradesRaw(d.gradesRaw);
    if(d.analytics) setAnalytics(d.analytics);
    if(d.plan)      setPlan(d.plan);
    setShowDraftPrompt(false);
    setDraftData(null);
  };

  const handleFreshStart=()=>{
    // Clear saved draft completely
    try{localStorage.removeItem(KEY);}catch{}
    setTeacher({name:'',grade:'',date:''});
    setSubject(null); setPhase(0);
    setTableRaw(''); setParsedQ([]);
    setGradesRaw(''); setAnalytics(null);
    setPlan({resources:'',period:'',hours:'',assessment:'',reEvalDate:''});
    setShowDraftPrompt(false);
    setDraftData(null);
  };

  const handleSave=()=>{
    sd({lang,subject,phase,teacher,tableRaw,parsedQ,gradesRaw,analytics,plan});
    setSavedMsg(true);setTimeout(()=>setSavedMsg(false),2000);
  };

  const BackBtn=({to,label})=>(
    <button onClick={()=>{setPhase(to);setShowPlan(false);setSubject(to===0?null:subject);}}
      className="no-print"
      style={{
        display:'inline-flex',alignItems:'center',gap:'8px',
        padding:'10px 22px',borderRadius:'14px',
        background:'linear-gradient(135deg,#1e3a5f,#0f2749)',
        color:'white',fontWeight:700,fontSize:'1rem',
        border:'none',cursor:'pointer',
        boxShadow:'0 4px 14px rgba(15,39,73,.35)',
        transition:'all .2s'
      }}
      onMouseEnter={e=>{e.currentTarget.style.transform='translateY(-2px)';e.currentTarget.style.boxShadow='0 8px 20px rgba(15,39,73,.45)';}}
      onMouseLeave={e=>{e.currentTarget.style.transform='translateY(0)';e.currentTarget.style.boxShadow='0 4px 14px rgba(15,39,73,.35)';}}>
      <span style={{fontSize:'1.1rem'}}>{dir==='rtl'?'→':'←'}</span>
      {label||t.back}
    </button>
  );
  const hasDraft=()=>{try{const k=localStorage.getItem(KEY);return !!(k&&JSON.parse(k)?.teacher?.name);}catch{return false;}};
  const SaveBtn=()=>(
    <div className="no-print" style={{display:'flex',gap:'8px',alignItems:'center'}}>
      <button onClick={handleSave}
        style={{padding:"10px 20px",borderRadius:"12px",border:"2px solid",borderColor:savedMsg?"#4ade80":"#d1d5db",color:savedMsg?"#16a34a":"#6b7280",background:savedMsg?"#f0fdf4":"white",fontWeight:700,fontSize:"1rem",cursor:"pointer",transition:'all .2s'}}>
        {savedMsg?`✓ ${t.saved}`:t.save}
      </button>
      {hasDraft()&&<button onClick={()=>{try{localStorage.removeItem(KEY);}catch{}setModalMsg(t.draftCleared||'✔ تم محو المسودة');}}
        title={t.clearDraft||'محو المسودة'}
        style={{padding:"10px 14px",borderRadius:"12px",border:"2px solid #fecaca",color:"#dc2626",background:"#fff5f5",fontWeight:700,fontSize:".9rem",cursor:"pointer"}}>
        🗑
      </button>}
    </div>
  );

  useEffect(()=>{
    if(phase===3&&analytics&&canvasRef.current){
      if(chartRef.current) chartRef.current.destroy();
      chartRef.current=new Chart(canvasRef.current.getContext('2d'),{
        type:'doughnut',
        data:{labels:['0-40','40-60','60-80','80-100'],datasets:[{data:[analytics.distribution["0-40"],analytics.distribution["40-60"],analytics.distribution["60-80"],analytics.distribution["80-100"]],backgroundColor:['#ef4444','#f59e0b','#3b82f6','#10b981'],hoverOffset:8}]},
        options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:11},padding:14}}}}
      });
    }
  },[phase,analytics]);

  useEffect(()=>{
    if(compareAna&&cmpCanvasRef.current){
      if(cmpChartRef.current) cmpChartRef.current.destroy();
      cmpChartRef.current=new Chart(cmpCanvasRef.current.getContext('2d'),{
        type:'bar',
        data:{
          labels:['0-40','40-60','60-80','80-100'],
          datasets:[
            {label:t.exam1,data:[analytics.distribution["0-40"],analytics.distribution["40-60"],analytics.distribution["60-80"],analytics.distribution["80-100"]],backgroundColor:'rgba(59,130,246,.7)',borderRadius:6},
            {label:t.exam2,data:[compareAna.distribution["0-40"],compareAna.distribution["40-60"],compareAna.distribution["60-80"],compareAna.distribution["80-100"]],backgroundColor:'rgba(249,115,22,.7)',borderRadius:6}
          ]
        },
        options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top'}},scales:{y:{beginAtZero:true}}}
      });
    }
  },[compareAna]);

  const generateExcel=()=>{
    const data=parseMD(tableRaw);
    if(!data){
      const msg = t.badTable + '\n\n' + (
        t.badTableHelp ||
        'Example format:\n| Section | Q | Bloom Skill | Content Skill | Score |\n|---|---|---|---|---|\n| A | 1 | Understand | Reading | 10 |'
      );
      setModalMsg(msg);
      return;
    }
    setParsedQ(data);
    const wb=XLSX.utils.book_new();
    let totalMax=0;
    const r1=[t.subjects[subject]||subject],r2=['Q#'],r3=['Core Skill (Bloom)'],r4=['Secondary Skill'],r5=['Max'];
    data.forEach(q=>{r1.push(q.section);r2.push(q.qNum);r3.push(q.bloomSkill||'');r4.push(q.contentSkill||'');r5.push(q.max);totalMax+=q.max;});
    r1.push('');r2.push('');r3.push('');r4.push('');r5.push('Total');
    if(totalMax!==100) r5.push('/100');
    const rows=[r1,r2,r3,r4,r5];
    for(let i=0;i<35;i++){const r=[`Student ${i+1}`];for(let j=0;j<data.length;j++) r.push('');rows.push(r);}
    const ws=XLSX.utils.aoa_to_sheet(rows);
    // Student data starts at row 6 (5 header rows), score columns start after the 5 row-header cols
    for(let i=6;i<=40;i++){
      const sc=XLSX.utils.encode_col(5),ec=XLSX.utils.encode_col(4+data.length),tc=XLSX.utils.encode_col(5+data.length);
      ws[tc+i]={t:'n',f:`SUM(${sc}${i}:${ec}${i})`};
      if(totalMax!==100){const xc=XLSX.utils.encode_col(6+data.length);ws[xc+i]={t:'n',f:`(${tc}${i}/${totalMax})*100`};}
    }
    XLSX.utils.book_append_sheet(wb,ws,'Screening');
    XLSX.writeFile(wb,`ClassScan_${teacher.grade||'class'}.xlsx`);
  };

  const analyzeData=()=>{
    const scores=parseScores(gradesRaw);
    if(!scores.length){setModalMsg(t.noData);return;}
    const dist=buildDist(scores);
    setAnalytics({scores,distribution:dist,totalStudents:scores.length,average:avg(scores)});
    setPhase(3);handleSave();
  };

  const doCompare=()=>{
    const sc=parseScores(compareRaw);
    if(!sc.length){setModalMsg(t.noData);return;}
    setCompareAna({scores:sc,distribution:buildDist(sc),totalStudents:sc.length,average:avg(sc)});
  };

  const exportLists=()=>{
    if(!analytics) return;
    const wb=XLSX.utils.book_new();
    const mk=(label,min,max)=>{
      const filtered=analytics.scores.filter(s=>s>=min&&s<=max);
      const rows=[[label],[`Range: ${min}-${max}`],['#','Score']];
      filtered.forEach((s,i)=>rows.push([i+1,s]));
      const ws=XLSX.utils.aoa_to_sheet(rows);
      XLSX.utils.book_append_sheet(wb,ws,label.substring(0,28));
    };
    mk(t.listInt,0,40);mk(t.listStr,41,60);mk(t.listEnr,80,100);
    XLSX.writeFile(wb,`groups_${teacher.grade||'class'}.xlsx`);
  };

  const promptText=subject?(PROMPTS[subject]?.[lang]||PROMPTS[subject]?.ar):'';

  /* ═══ SPLASH ═══ */
  if(!lang) return(
    <>
    <Modal msg={modalMsg} onClose={()=>setModalMsg(null)}/>
    {showDraftPrompt && draftData && <DraftPrompt t={t} draft={draftData} onContinue={handleContinueDraft} onFresh={handleFreshStart} dir={dir}/>}
    <div className="min-h-screen flex items-center justify-center p-4">
      <div className="max-w-lg w-full bg-white/95 rounded-3xl shadow-2xl overflow-hidden fade-in">
        <SiteHeader t={UI.ar}/>
        <div className="p-8 text-center">
          <p className="text-gray-600 font-semibold mb-6 text-base">{UI.ar.splashLabel} / {UI.he.splashLabel} / {UI.en.splashLabel}</p>
          <div className="flex gap-3">
            {[['ar',UI.ar.langBtns.ar,'#3b82f6'],['he',UI.he.langBtns.he,'#8b5cf6'],['en',UI.en.langBtns.en,'#f59e0b']].map(([l,lbl,c])=>(
              <button key={l} onClick={()=>{
                const saved=ld();
                setLang(l);
                if(saved&&saved.teacher&&saved.teacher.name){
                  setDraftData(saved);
                  setShowDraftPrompt(true);
                }
              }}
                className="flex-1 py-4 rounded-2xl text-white font-bold text-lg shadow-lg hover:opacity-90 transition cursor-pointer"
                style={{background:`linear-gradient(135deg,${c},${c}bb)`}}>{lbl}</button>
            ))}
          </div>
        </div>
      </div>
    </div>
    </>
  );

  /* ═══ SUBJECT PICK ═══ */
  if(!subject) return(
    <>
    <Modal msg={modalMsg} onClose={()=>setModalMsg(null)}/>
    <div className="min-h-screen flex items-center justify-center p-4" dir={dir}>
      <div className="max-w-2xl w-full bg-white/95 rounded-3xl shadow-2xl overflow-hidden fade-in">
        <SiteHeader t={t}/>
        <div className="p-8">
          <button onClick={()=>setLang(null)} className="no-print" style={{display:'inline-flex',alignItems:'center',gap:'8px',padding:'10px 22px',borderRadius:'14px',background:'linear-gradient(135deg,#1e3a5f,#0f2749)',color:'white',fontWeight:700,fontSize:'1rem',border:'none',cursor:'pointer',boxShadow:'0 4px 14px rgba(15,39,73,.35)',marginBottom:'20px'}}>
            <span>{dir==='rtl'?'→':'←'}</span> {t.back}
          </button>
          <div className="text-center mb-2">
            <h2 className="text-2xl font-black text-gray-800">{t.pickSubject}</h2>
            <p className="text-gray-400 text-sm mt-1">{t.subjectHint}</p>
          </div>
          <SubjectPicker selected={subject} onChange={s=>{setSubject(s);setPhase(1);}} t={t}/>
        </div>
      </div>
    </div>
    </>
  );

  /* ═══ WORKFLOW ═══ */
  return(
    <>
    <Modal msg={modalMsg} onClose={()=>setModalMsg(null)}/>
    <div style={{minHeight:'100vh',background:'linear-gradient(135deg,#f0f9ff 0%,#fdf4ff 50%,#fff7ed 100%)'}} dir={dir}>
      <div style={{maxWidth:'900px',margin:'0 auto',background:'rgba(255,255,255,.97)',boxShadow:'0 4px 40px rgba(0,0,0,.15)',borderRadius:'0 0 24px 24px',minHeight:'100vh'}}>
        <MiniHeader t={t}/>
        <div style={{padding:'0 32px 56px'}}>
          <StepBar phase={phase} t={t}/>

          {/* ── Phase 1: Teacher Info ── */}
          {phase===1&&(
            <div className="fade-in space-y-6">
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"16px",paddingBottom:"16px",borderBottom:"2px solid #f1f5f9"}}><BackBtn to={0}/><SaveBtn/></div>
              <h2 style={{fontSize:"1.6rem",fontWeight:900,color:"#1e3a5f",marginBottom:"8px"}}>{t.step1}</h2>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                {[['name',t.teacherName,'text',''],['grade',t.gradeLabel,'text',''],['date',t.examDate,'date','']].map(([k,lbl,type,ph])=>(
                  <div key={k}>
                    <label style={{display:"block",fontSize:"1rem",fontWeight:700,color:"#374151",marginBottom:"6px"}}>{lbl}</label>
                    <input type={type} value={teacher[k]} placeholder={ph}
                      onChange={e=>setTeacher({...teacher,[k]:e.target.value})}
                      style={{width:"100%",padding:"14px 16px",borderRadius:"14px",border:"2px solid #e5e7eb",outline:"none",fontSize:"1.05rem",fontFamily:"Cairo,sans-serif",transition:"border-color .2s"}}
                      onFocus={e=>e.target.style.borderColor="#f97316"}
                      onBlur={e=>e.target.style.borderColor="#e5e7eb"}/>
                  </div>
                ))}
                <div>
                  <label style={{display:"block",fontSize:"1rem",fontWeight:700,color:"#374151",marginBottom:"6px"}}>{t.subjectLabel}</label>
                  <div style={{padding:"14px 16px",borderRadius:"14px",border:"2px solid #e5e7eb",background:"#f9fafb",fontWeight:700,fontSize:"1.05rem",display:"flex",alignItems:"center",gap:"10px",color:sm.color}}>
                    {sm.icon} {t.subjects[subject]}
                  </div>
                </div>
              </div>
              <div className="flex justify-between items-center pt-2">
                <button onClick={()=>{setSubject(null);setParsedQ([]);}} className="text-sm text-gray-400 hover:text-orange-500 no-print">
                  🔄 {t.pickSubject}
                </button>
                <button onClick={()=>{
                  if(!teacher.name||!teacher.grade||!teacher.date){setModalMsg(t.fillAll);return;}
                  setPhase(2);handleSave();
                }} className="glow-orange bg-gradient-to-r from-orange-500 to-amber-400 text-white font-bold px-8 py-3 rounded-full cursor-pointer">
                  {t.next} {dir==='rtl'?'←':'→'}
                </button>
              </div>
            </div>
          )}

          {/* ── Phase 2: Exam Structure ── */}
          {phase===2&&(
            <div className="fade-in space-y-6">
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"16px",paddingBottom:"16px",borderBottom:"2px solid #f1f5f9"}}><BackBtn to={1}/><SaveBtn/></div>
              <div className="rounded-2xl border-2 p-5" style={{borderColor:sm.border,background:sm.bg}}>
                <div className="flex items-start justify-between gap-3 mb-3">
                  <div>
                    <h3 style={{fontSize:"1.2rem",fontWeight:800,color:sm.color}}>{t.promptTitle}</h3>
                    <p style={{fontSize:".9rem",color:"#6b7280",marginTop:"4px"}}>{t.promptDesc}</p>
                  </div>
                  <CopyBtn text={promptText} t={t}/>
                </div>
                <pre className="bg-white border rounded-xl p-4 text-sm font-mono text-gray-700 whitespace-pre-wrap select-all"
                  style={{borderColor:sm.border,direction:'ltr',textAlign:'left'}}>{promptText}</pre>
                <div className="mt-3 flex flex-wrap gap-2 items-center">
                  <span className="text-xs text-gray-500 font-semibold">{t.aiTools}</span>
                  {[['ChatGPT','https://chat.openai.com'],['Claude','https://claude.ai'],['Gemini','https://gemini.google.com'],['Copilot','https://copilot.microsoft.com']].map(([n,u])=>(
                    <a key={n} href={u} target="_blank" className="text-xs px-2 py-1 rounded-lg bg-white border border-gray-200 text-blue-600 hover:bg-blue-50 transition font-medium">{n} ↗</a>
                  ))}
                </div>
              </div>
              <div>
                <label style={{display:"block",fontSize:"1rem",fontWeight:700,color:"#374151",marginBottom:"8px"}}>{t.pasteTable}</label>
                <textarea rows="6" value={tableRaw} onChange={e=>setTableRaw(e.target.value)}
                  style={{width:"100%",padding:"14px 16px",borderRadius:"14px",border:"2px solid #e5e7eb",outline:"none",fontFamily:"monospace",fontSize:"1rem",background:"#f9fafb",direction:"ltr",textAlign:"left"}}/>
              </div>
              {parsedQ.length>0&&<TablePreview data={parsedQ} t={t} lang={lang}/>}
              <button onClick={generateExcel} className="glow-teal w-full bg-gradient-to-r from-teal-500 to-emerald-500 text-white font-bold text-lg py-4 rounded-2xl cursor-pointer">
                📊 {t.generateExcel}
              </button>
              {parsedQ.length>0&&(
                <div className="mt-2 p-5 rounded-2xl bg-amber-50 border border-amber-200 fade-in">
                  <p style={{fontSize:"1rem",fontWeight:700,color:"#92400e",marginBottom:"12px"}}>✅ {t.excelOk}</p>
                  <label style={{display:"block",fontSize:"1rem",fontWeight:700,color:"#374151",marginBottom:"8px"}}>{t.pasteData}</label>
                  <textarea rows="7" value={gradesRaw} onChange={e=>setGradesRaw(e.target.value)}
                    style={{width:"100%",padding:"14px 16px",borderRadius:"14px",border:"2px solid #fcd34d",outline:"none",fontFamily:"monospace",fontSize:"1rem",background:"white",direction:"ltr",textAlign:"left"}}/>
                  <button onClick={analyzeData} className="glow-purple mt-3 w-full bg-gradient-to-r from-violet-500 to-pink-500 text-white font-bold py-3 rounded-2xl cursor-pointer">
                    📈 {t.analyzeBtn}
                  </button>
                </div>
              )}
            </div>
          )}

          {/* ── Phase 3: Analysis + Plan ── */}
          {phase===3&&analytics&&(
            <div className="fade-in space-y-8">
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"16px",paddingBottom:"16px",borderBottom:"2px solid #f1f5f9"}} className="no-print"><BackBtn to={2}/><SaveBtn/></div>
              <MotivBanner analytics={analytics} t={t}/>
              <div>
                <h2 className="text-xl font-bold text-gray-800 text-center mb-4">{t.dist}</h2>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-5 items-center">
                  <div className="h-64 bg-gray-50 rounded-2xl border p-3"><canvas ref={canvasRef}></canvas></div>
                  <div className="rounded-2xl border overflow-hidden">
                    <table className="w-full text-center text-sm">
                      <thead className="bg-gray-100">
                        <tr><th className="py-2 px-3">{t.range}</th><th className="py-2 px-3">{t.count}</th><th className="py-2 px-3">{t.pct}</th></tr>
                      </thead>
                      <tbody className="divide-y">
                        {[["0-40","ef4444","fee2e2"],["40-60","f59e0b","fef9c3"],["60-80","3b82f6","eff6ff"],["80-100","10b981","dcfce7"]].map(([r,c,bg])=>(
                          <tr key={r} style={{background:`#${bg}`}}>
                            <td className="py-2 font-bold" style={{color:`#${c}`}}>{r}</td>
                            <td className="py-2 font-bold">{analytics.distribution[r]}</td>
                            <td className="py-2 font-semibold" style={{color:`#${c}`}}>{((analytics.distribution[r]/analytics.totalStudents)*100).toFixed(1)}%</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                    <div className="bg-gray-50 px-4 py-2 text-xs text-center font-bold text-gray-500 flex justify-around">
                      <span>{t.totalStudents}: <strong>{analytics.totalStudents}</strong></span>
                      <span>{t.avgLabel}: <strong>{analytics.average.toFixed(1)}</strong></span>
                    </div>
                  </div>
                </div>
              </div>
              <div className="flex flex-wrap gap-3 no-print">
                <button onClick={exportLists} className="glow-teal px-5 py-2 rounded-xl bg-teal-600 text-white text-sm font-bold cursor-pointer">
                  📋 {t.exportList}
                </button>
                <button onClick={()=>setShowCompare(!showCompare)} className="px-5 py-2 rounded-xl border-2 border-blue-400 text-blue-600 text-sm font-bold hover:bg-blue-50 transition cursor-pointer">
                  🔄 {t.compareBtn}
                </button>
              </div>
              {showCompare&&(
                <div className="p-5 bg-blue-50 border border-blue-200 rounded-2xl fade-in no-print">
                  <h3 className="font-bold text-blue-700 mb-3">{t.compareTitle}</h3>
                  <textarea rows="5" value={compareRaw} onChange={e=>setCompareRaw(e.target.value)}
                    className="w-full px-4 py-3 rounded-xl border border-blue-200 outline-none text-sm font-mono mb-3"
                    placeholder={t.compareHint} style={{direction:'ltr',textAlign:'left'}}/>
                  <button onClick={doCompare} className="glow-blue px-6 py-2 rounded-xl bg-blue-600 text-white font-bold text-sm cursor-pointer">{t.analyzeBtn}</button>
                  {compareAna&&(
                    <div className="mt-4">
                      <div className="h-52 bg-white rounded-xl border p-3"><canvas ref={cmpCanvasRef}></canvas></div>
                      <div className="grid grid-cols-2 gap-3 mt-3 text-sm">
                        <div className="bg-blue-100 rounded-xl p-3 text-center">
                          <div className="font-bold text-blue-700">{t.exam1}</div>
                          <div className="text-2xl font-black text-blue-900">{analytics.average.toFixed(1)}</div>
                          <div className="text-xs text-blue-500">{t.avgLabel}</div>
                        </div>
                        <div className="bg-orange-100 rounded-xl p-3 text-center">
                          <div className="font-bold text-orange-700">{t.exam2}</div>
                          <div className="text-2xl font-black text-orange-900">{compareAna.average.toFixed(1)}</div>
                          <div className="text-xs text-orange-500">{t.avgLabel}</div>
                        </div>
                      </div>
                    </div>
                  )}
                </div>
              )}
              {!showPlan&&(
                <div className="bg-white border-2 border-dashed border-gray-200 rounded-2xl p-6 space-y-4 no-print">
                  <h3 style={{fontSize:"1.4rem",fontWeight:800,color:"#1e3a5f",marginBottom:"4px"}}>{t.interventionTitle}</h3>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                    {[['resources',t.resources,t.resourcesHint,'text','md:col-span-2'],['period',t.period,t.periodHint,'text',''],['hours',t.hours,t.hoursHint,'text',''],['assessment',t.assessment,t.assessmentHint,'text',''],['reEvalDate',t.reEval,'','date','']].map(([k,lbl,ph,type,ex])=>(
                      <div key={k} className={ex}>
                        <label style={{display:"block",fontSize:"1rem",fontWeight:700,color:"#374151",marginBottom:"6px"}}>{lbl}</label>
                        <input type={type} value={plan[k]} placeholder={ph}
                          onChange={e=>setPlan({...plan,[k]:e.target.value})}
                          style={{width:"100%",padding:"13px 16px",borderRadius:"13px",border:"2px solid #e5e7eb",outline:"none",fontSize:"1rem",fontFamily:"Cairo,sans-serif"}}
                          onFocus={e=>e.target.style.borderColor="#f97316"}
                          onBlur={e=>e.target.style.borderColor="#e5e7eb"}/>
                      </div>
                    ))}
                  </div>
                  <button onClick={()=>setShowPlan(true)} className="glow-orange w-full bg-gradient-to-r from-gray-800 to-gray-700 text-white font-bold py-3 rounded-xl cursor-pointer">
                    ✨ {t.generatePlan}
                  </button>
                </div>
              )}
              {showPlan&&(
                <div id="plan-print-area" className="bg-white rounded-2xl border shadow-sm p-6 md:p-8 space-y-6 fade-in print-ok" dir={dir}>
                  <div className="flex flex-wrap gap-3 justify-end no-print">
                    <button onClick={()=>setShowPlan(false)} style={{display:'inline-flex',alignItems:'center',gap:'8px',padding:'10px 22px',borderRadius:'14px',background:'linear-gradient(135deg,#1e3a5f,#0f2749)',color:'white',fontWeight:700,fontSize:'1rem',border:'none',cursor:'pointer',boxShadow:'0 4px 14px rgba(15,39,73,.35)'}}>
                      <span>{dir==='rtl'?'→':'←'}</span> {t.back}
                    </button>
                    <button onClick={()=>doExportDocx({t,analytics,plan,teacher})} className="glow-blue px-4 py-2 rounded-xl bg-blue-600 text-white text-sm font-bold cursor-pointer">📄 {t.downloadDocx}</button>
                    <button onClick={doExportPDF} className="px-4 py-2 rounded-xl bg-red-600 text-white text-sm font-bold hover:bg-red-700 transition cursor-pointer">📑 {t.downloadPdf}</button>
                    <button onClick={()=>window.print()} className="px-4 py-2 rounded-xl bg-gray-800 text-white text-sm font-bold hover:bg-gray-700 transition cursor-pointer">🖨️ {t.print}</button>
                  </div>
                  <div className="text-center border-b-2 border-orange-100 pb-5" style={{background:'linear-gradient(135deg,#fff7ed,#fff)',borderRadius:'16px',padding:'24px'}}>
                    <img src={LOGO} alt="logo" style={{width:'58px',height:'58px',borderRadius:'12px',objectFit:'cover',margin:'0 auto 10px'}} onError={e=>e.target.style.display='none'}/>
                    <div style={{fontSize:'1.4rem',fontWeight:900,color:'#ea580c'}}>{t.mainTitle}</div>
                    <div style={{fontSize:'.82rem',fontWeight:700,color:'#92400e',marginTop:'4px'}}>{t.mainSub}</div>
                    <div style={{fontSize:'1.05rem',fontWeight:700,color:'#1f2937',marginTop:'10px'}}>{t.planTitle}</div>
                    <div style={{fontSize:'.78rem',color:'#6b7280',marginTop:'4px'}}>{teacher.grade} — {t.subjects[subject]} — {teacher.date}</div>
                    <div style={{fontSize:'.73rem',color:'#9ca3af'}}>{teacher.name}</div>
                  </div>
                  <section>
                    <h3 style={{fontSize:'1.05rem',fontWeight:700,color:'#1d4ed8',borderBottom:'2px solid #dbeafe',paddingBottom:'6px',marginBottom:'10px'}}>1. {t.distSection}</h3>
                    <ul style={{listStyle:'none',display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px',fontSize:'.88rem'}}>
                      {[['📊 '+t.totalStudents,analytics.totalStudents,'#374151'],['🔴 '+t.intensive,analytics.distribution["0-40"],'#dc2626'],['🟡 '+t.strategic,analytics.distribution["40-60"],'#d97706'],['🔵 60-80',analytics.distribution["60-80"],'#1d4ed8'],['🟢 80-100',analytics.distribution["80-100"],'#059669'],['📈 '+t.avgLabel,analytics.average.toFixed(1),'#374151']].map(([lbl,val,c])=>(
                        <li key={lbl} style={{background:'#f9fafb',borderRadius:'10px',padding:'8px 12px',color:c}}><strong>{lbl}:</strong> {val}</li>
                      ))}
                    </ul>
                  </section>
                  <section>
                    <h3 style={{fontSize:'1.05rem',fontWeight:700,color:'#7c3aed',borderBottom:'2px solid #ede9fe',paddingBottom:'6px',marginBottom:'10px'}}>2. {t.timeframe}</h3>
                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px',fontSize:'.85rem'}}>
                      {[[t.workPeriod,plan.period||t.notSet],[t.weeklyHours,plan.hours||t.notSet],[t.evalMethod,plan.assessment||t.notSet],[t.reEvalDate,plan.reEvalDate||t.notSet],[t.availableRes,plan.resources||t.notSet]].map(([k,v])=>(
                        <div key={k} style={{background:'#faf5ff',borderRadius:'10px',padding:'10px 12px',border:'1px solid #ede9fe'}}>
                          <div style={{fontWeight:700,color:'#6d28d9',fontSize:'.78rem'}}>{k}</div>
                          <div style={{color:'#1f2937',marginTop:'3px'}}>{v}</div>
                        </div>
                      ))}
                    </div>
                  </section>
                  <section>
                    <h3 style={{fontSize:'1.05rem',fontWeight:700,color:'#ea580c',borderBottom:'2px solid #fed7aa',paddingBottom:'6px',marginBottom:'10px'}}>3. {t.strategiesTitle}</h3>
                    <div style={{overflowX:'auto'}}>
                      <table style={{width:'100%',borderCollapse:'collapse',fontSize:'.83rem'}}>
                        <thead>
                          <tr style={{background:'#f1f5f9'}}>
                            <th style={{border:'1px solid #e5e7eb',padding:'10px',width:'28%',textAlign:'center'}}>{t.groupTarget}</th>
                            <th style={{border:'1px solid #e5e7eb',padding:'10px',textAlign:'start'}}>{t.strategy}</th>
                          </tr>
                        </thead>
                        <tbody>
                          {[[t.intensiveGroup,'#dc2626','#fee2e2',t.intensiveStr],[t.strategicGroup,'#d97706','#fef9c3',t.strategicStr],[t.enrichGroup,'#059669','#dcfce7',t.enrichStr]].map(([grp,c,bg,str])=>(
                            <tr key={grp} style={{background:bg}}>
                              <td style={{border:'1px solid #e5e7eb',padding:'10px',fontWeight:700,textAlign:'center',color:c}}>{grp}</td>
                              <td style={{border:'1px solid #e5e7eb',padding:'10px',color:'#374151'}}>{str}</td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  </section>
                  <p style={{fontSize:'.72rem',color:'#9ca3af',textAlign:'center',paddingTop:'8px'}}>{t.mainTitle} — {new Date().toLocaleDateString()}</p>
                </div>
              )}
            </div>
          )}
          <div className="no-print" style={{marginTop:"40px",paddingTop:"16px",borderTop:"1px solid #f1f5f9",textAlign:"center",fontSize:".8rem",color:"#9ca3af"}}>{t.mainTitle} — v3.2</div>
        </div>
      </div>
    </div>
    </>
  );
};

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
